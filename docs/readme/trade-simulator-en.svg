<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Trade simulator workflow</title>
  <desc id="desc">Three-step workflow for selecting a target team, outgoing players, incoming players, generating projections, and exporting posters.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c2314"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#f2eee7"/>
  <text x="72" y="76" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#1d1b17">Trade Simulation Workflow</text>
  <text x="72" y="116" font-family="Arial, sans-serif" font-size="20" fill="#756e66">Target team, trade package, post-trade projection, and poster export.</text>
  <g transform="translate(72 170)">
    <rect width="310" height="330" rx="24" fill="#fffaf2" stroke="#d7c8b6"/>
    <text x="26" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#7c2314">1. Select Team</text>
    <rect x="26" y="78" width="258" height="52" rx="12" fill="#ffffff" stroke="#d7c8b6"/>
    <text x="48" y="112" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#1d1b17">Thunder (OKC) · 64W</text>
    <g transform="translate(26 162)">
      <rect width="116" height="64" rx="14" fill="#ffffff" stroke="#d7c8b6"/>
      <text x="18" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#756e66">Wins</text>
      <text x="18" y="54" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#1d1b17">64</text>
      <rect x="142" width="116" height="64" rx="14" fill="#ffffff" stroke="#d7c8b6"/>
      <text x="160" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#756e66">Net Rtg</text>
      <text x="160" y="54" font-family="Arial, sans-serif" font-size="24" font-weight="900" fill="#1d1b17">+12.8</text>
    </g>
    <text x="26" y="274" font-family="Arial, sans-serif" font-size="17" fill="#756e66">Load current team state and roster-correction items.</text>
  </g>
  <line x1="410" y1="335" x2="500" y2="335" stroke="#7c2314" stroke-width="6" marker-end="url(#arrow)"/>
  <g transform="translate(520 170)">
    <rect width="310" height="330" rx="24" fill="#fffaf2" stroke="#d7c8b6"/>
    <text x="26" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#7c2314">2. Build Package</text>
    <rect x="26" y="82" width="258" height="76" rx="16" fill="#ffffff" stroke="#d7c8b6"/>
    <circle cx="62" cy="120" r="24" fill="#d7c8b6"/>
    <text x="102" y="114" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#1d1b17">Outgoing Players</text>
    <text x="102" y="138" font-family="Arial, sans-serif" font-size="14" fill="#756e66">Salary, avatar, core stats</text>
    <rect x="26" y="184" width="258" height="76" rx="16" fill="#ffffff" stroke="#d7c8b6"/>
    <circle cx="62" cy="222" r="24" fill="#d7c8b6"/>
    <text x="102" y="216" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#1d1b17">Incoming Players</text>
    <text x="102" y="240" font-family="Arial, sans-serif" font-size="14" fill="#756e66">Pick across source teams</text>
    <text x="26" y="300" font-family="Arial, sans-serif" font-size="17" fill="#756e66">Mobile uses compact dropdown steps.</text>
  </g>
  <line x1="858" y1="335" x2="948" y2="335" stroke="#7c2314" stroke-width="6" marker-end="url(#arrow)"/>
  <g transform="translate(968 170)">
    <rect width="240" height="330" rx="24" fill="#fffaf2" stroke="#d7c8b6"/>
    <text x="24" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#7c2314">3. Project</text>
    <rect x="24" y="82" width="192" height="58" rx="14" fill="#7c2314"/>
    <text x="120" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="900" fill="#fff">Project 2026-27</text>
    <text x="24" y="178" font-family="Arial, sans-serif" font-size="17" fill="#756e66">Output wins, win%, pace, offensive and defensive ratings.</text>
    <rect x="24" y="238" width="192" height="52" rx="14" fill="#ffffff" stroke="#d7c8b6"/>
    <text x="120" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="#1d1b17">Preview Poster</text>
  </g>
  <g transform="translate(72 560)">
    <rect width="1136" height="88" rx="24" fill="#ffffff" stroke="#d7c8b6"/>
    <text x="28" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#1d1b17">Poster Export</text>
    <text x="28" y="64" font-family="Arial, sans-serif" font-size="17" fill="#756e66">Compact posters show key changes and traded players. Full posters include team deltas, player data, salaries, and projected roster. Preview first, then download.</text>
  </g>
</svg>
