<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Paper Hoops homepage overview</title>
  <desc id="desc">Homepage overview showing visit counters, open source information, language switch, feature tabs, and scoring leaders.</desc>
  <defs>
